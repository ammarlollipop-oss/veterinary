```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinary Quiz Certificate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .option-btn:hover:not(.disabled) { background-color: #f9fafb; border-color: #9ca3af; }
        .correct-answer { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect-answer { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #065f46; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col">

    <div class="m-auto w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden border-t-8 border-green-800">
        <!-- Quiz Section -->
        <div id="quiz-container" class="p-8">
            <h1 class="text-2xl font-bold mb-6 text-green-900">Veterinary Basics Quiz</h1>
            <h2 id="question-text" class="text-xl font-medium mb-6 text-gray-800"></h2>
            <div id="options-container" class="space-y-3"></div>
            <div id="next-btn-container" class="mt-8 hidden"><button onclick="nextQuestion()" class="w-full bg-green-800 text-white font-bold py-3 rounded-lg hover:bg-green-900 transition">Next Question</button></div>
        </div>

        <!-- Result Section -->
        <div id="results-container" class="p-8 hidden text-center">
            <h2 id="result-title" class="text-3xl font-bold mb-4"></h2>
            <p id="score-text" class="text-lg mb-6"></p>
            
            <div id="action-buttons" class="space-x-4">
                <button onclick="location.reload()" class="border-2 border-gray-300 py-3 px-6 rounded-lg font-bold">Retake</button>
                <button id="submit-btn" onclick="submitResults()" class="bg-green-800 text-white py-3 px-6 rounded-lg font-bold">Submit for Certificate</button>
            </div>

            <!-- Certificate UI -->
            <div id="certificate-card" class="hidden border-8 border-green-800 p-8 m-4 bg-white shadow-lg text-center">
                <h1 class="text-3xl font-bold text-green-900 mb-2">CERTIFICATE</h1>
                <p class="text-gray-600 italic">Successfully completed</p>
                <div class="border-t-2 border-b-2 border-green-800 py-4 my-6">
                    <p class="text-xl font-bold uppercase">Introduction to Animal Care and Welfare</p>
                </div>
                <div class="mt-6 flex justify-between text-sm">
                    <p>Date: <span id="cert-date"></span></p>
                    <p>Director of Certification</p>
                </div>
            </div>
            
            <div id="processing-state" class="hidden justify-center items-center gap-3 text-green-800 font-bold"><div class="loader"></div> Processing...</div>
        </div>
    </div>

    <script>
        const questions = [
            { question: "Normal resting body temperature of a dog?", options: ["97°F", "101.5°F", "105°F", "95°F"], correctAnswer: 1 },
            { question: "Medical term for spaying?", options: ["Orchiectomy", "Cystocentesis", "Ovariohysterectomy", "Thoracocentesis"], correctAnswer: 2 },
            { question: "Toxic food for pets?", options: ["Carrots", "Grapes", "Rice", "Apples"], correctAnswer: 1 },
            { question: "Dog gestation period?", options: ["45 days", "63 days", "90 days", "120 days"], correctAnswer: 1 },
            { question: "What is a female cat?", options: ["Bitch", "Queen", "Doe", "Mare"], correctAnswer: 1 },
            { question: "Transmits Lyme disease?", options: ["Flea", "Mosquito", "Tick", "Mite"], correctAnswer: 2 },
            { question: "Tachycardia means?", options: ["Slow heart", "Fast heart", "High BP", "Low BP"], correctAnswer: 1 },
            { question: "Hindgut fermenter?", options: ["Horse", "Cow", "Dog", "Cat"], correctAnswer: 0 },
            { question: "Zoonotic disease?", options: ["Only in zoos", "Human to animal", "Genetic", "Old age"], correctAnswer: 1 },
            { question: "Guinea pigs need what vitamin?", options: ["A", "B12", "C", "D"], correctAnswer: 2 },
            { question: "NPO means?", options: ["New Patient", "Nothing by mouth", "No pain", "Normal Pulse"], correctAnswer: 1 },
            { question: "Collection of pus?", options: ["Tumor", "Hematoma", "Abscess", "Edema"], correctAnswer: 2 },
            { question: "True ruminant?", options: ["Pig", "Horse", "Cow", "Rabbit"], correctAnswer: 2 },
            { question: "Microchip location?", options: ["Shoulder", "Ear", "Belly", "Tail"], correctAnswer: 0 },
            { question: "Difficulty breathing?", options: ["Apnea", "Eupnea", "Dyspnea", "Tachypnea"], correctAnswer: 2 }
        ];

        let currentQuestionIndex = 0, score = 0, hasAnswered = false;

        function loadQuestion() {
            hasAnswered = false;
            document.getElementById('next-btn-container').classList.add('hidden');
            const q = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${q.question}`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-btn border-2 p-4 rounded-lg cursor-pointer';
                div.onclick = () => select(i, div);
                div.innerText = opt;
                container.appendChild(div);
            });
        }

        function select(idx, div) {
            if (hasAnswered) return;
            hasAnswered = true;
            if (idx === questions[currentQuestionIndex].correctAnswer) { score++; div.classList.add('correct-answer'); }
            else { div.classList.add('incorrect-answer'); }
            document.getElementById('next-btn-container').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) loadQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            const res = document.getElementById('results-container');
            res.classList.remove('hidden');
            const pass = score >= 7;
            document.getElementById('result-title').innerText = pass ? "Congratulations!" : "Keep Practicing";
            document.getElementById('score-text').innerText = `You scored ${score} out of 15. ${pass ? 'You passed!' : 'You need 7 to pass.'}`;
            if (!pass) document.getElementById('submit-btn').classList.add('hidden');
        }

        function submitResults() {
            document.getElementById('action-buttons').classList.add('hidden');
            document.getElementById('processing-state').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('processing-state').classList.add('hidden');
                document.getElementById('certificate-card').classList.remove('hidden');
                document.getElementById('cert-date').innerText = new Date().toLocaleDateString();
            }, 2000);
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
